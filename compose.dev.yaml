services:
  web:
    image: docker.io/library/node:24-bookworm-slim
    working_dir: /app
    command: ["sh", "/app/scripts/container-dev.sh"]
    environment:
      NEXT_PUBLIC_SITE_URL: "http://localhost:${CREED_DEV_PORT:-3000}"
      NEXT_PUBLIC_SUPABASE_URL:
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:
      SUPABASE_SECRET_KEY:
      CREED_ENCRYPTION_SECRET:
      CREED_SELF_HOSTED:
    ports:
      - "${CREED_DEV_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_runtime:/app/.next-runtime
      - ${CREED_DEV_NEXT_ENV_FILE}:/app/next-env.d.ts

volumes:
  node_modules:
  next_runtime:
